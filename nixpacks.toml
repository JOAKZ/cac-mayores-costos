[phases.setup]
nixPkgs = ["...", "python3"]

# Para Linux las librerías gráficas, de audio y de sistema que Chromium necesita para funcionar
aptPkgs = [
    "...", 
    "libglib2.0-0", 
    "libnss3", 
    "libnspr4", 
    "libatk1.0-0", 
    "libatk-bridge2.0-0", 
    "libcups2", 
    "libdrm2", 
    "libdbus-1-3", 
    "libxcb1", 
    "libxkbcommon0", 
    "libx11-6", 
    "libxcomposite1", 
    "libxdamage1", 
    "libxext6", 
    "libxfixes3", 
    "libxrandr2", 
    "libgbm1", 
    "libpango-1.0-0", 
    "libcairo2", 
    "libasound2"
]

[phases.build]
cmds = [
    "pip install -r requirements.txt",
    "python manage.py collectstatic --noinput",
    "playwright install chromium"
]